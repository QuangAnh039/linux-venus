%YAML 1.2
---
$id: "http://devicetree.org/schemas/interrupt-controller/cortina-access,per-ictl.yaml#"
$schema: "http://devicetree.org/meta-schemas/core.yaml#"

title: Cortina-Access peripheral interrupt controller

maintainers:
  - Jason Li <jason.li@cortina-access.com>

properties:
  compatible:
    const: cortina-access,per-ictl

  reg:
    items:
      - description: Control registers base address and length

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    per_ictl: per_ictl@f4329004  {
				compatible = "cortina-access,per-ictl";
				reg = <0x0 0xf4329004  0x0 0x10>;
				interrupt-controller;
				#interrupt-cells = <1>;
				interrupt-parent = <&gic>;
				interrupts = <GIC_SPI IRQ_GLB_PERI IRQ_TYPE_LEVEL_HIGH>;
	};
