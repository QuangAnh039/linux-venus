%YAML 1.2
---
$id: http://devicetree.org/schemas/thermal/fsl,scu-thermal.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Cortina-Access SOC thermal sensor

maintainers:
  - Jason Li<jason.li@cortina-access.com>

description: Cortina-Access SOC thermal sensor driver

allOf:
  - $ref: thermal-sensor.yaml#

properties:
  compatible:
    items:
      - const: cortina-access,thermal-sensor

reg:
  maxItems: 1
  description: >
  Address range for the thermal sensor registers

tms-reg-a:
  maxItems: 1
  description: >
  Thermal parameter in TMS_REG_A

tms-reg-b:
  maxItems: 1
  description: >
  Thermal parameter in TMS_REG_A

'#thermal-sensor-cells':
    const: 1

required:
  - compatible
  - reg
  - '#thermal-sensor-cells'


additionalProperties: false

examples:
  - |
      thermal@f43201ec {
          compatible = "cortina-access,thermal-sensor";
          reg = <0xf43201ec 0x14>;
      };
