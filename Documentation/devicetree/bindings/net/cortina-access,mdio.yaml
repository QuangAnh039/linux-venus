%YAML 1.2
---
$id: "http://devicetree.org/schemas/interrupt-controller/cortina-access,mdio.yaml#"
$schema: "http://devicetree.org/meta-schemas/core.yaml#"

title: Cortina-Access MDIO bus controller

maintainers:
  - Pengpeng Chen <pengpeng.chen@cortina-access.com>

allOf:
  - $ref: mdio.yaml#

properties:
  compatible:
    const: cortina-access,mdio

  reg:
    items:
      - description: Control registers base address and length

  clocks:
    description: A reference to the clock supplying the MDIO bus controller

  clock-frequency:
    description: >
      The MDIO bus clock that must be output by the MDIO bus hardware, if
      absent, the default hardware values are used

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
	  mdio: mdio@f4329134 {
		  compatible = "cortina-access,mdio";
		  reg = <0x0 0xf4329134 0x0 0x48>;
		  interrupt-parent = <&per_ictl>;
		  interrupts = <IRQ_PER_MDIO>;
		  clocks = <&apb_pclk>;
		  peri-clock-frequency = <125000000>;
		  clock-frequency = <2500000>;
	  };
