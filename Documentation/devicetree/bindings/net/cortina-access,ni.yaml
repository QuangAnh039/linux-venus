%YAML 1.2
---
$id: "http://devicetree.org/schemas/interrupt-controller/cortina-access,ni.yaml#"
$schema: "http://devicetree.org/meta-schemas/core.yaml#"

title: Cortina-Access Network Interface

maintainers:
  - Aaron Tseng <aaron.tseng@cortina-access.com>

allOf:
  - $ref: ethernet-controller.yaml#

properties:
  compatible:
    const: cortina-access,ni

  reg:
    items:
      - description: Control registers base address and length

required:
  - compatible
  - reg

unevaluatedProperties: false

examples:
  - |
    ethernet: ethernet@f4300000  {
				compatible = "cortina-access,ni";
				reg = <0x0 0xf4300000  0x0 0x10000>;
				#interrupt-cells = <4>;
				interrupt-parent = <&gic>;
				interrupts = <GIC_SPI IRQ_GLB_QM_CPU0 IRQ_TYPE_LEVEL_HIGH>,
					     <GIC_SPI IRQ_GLB_QM_CPU1 IRQ_TYPE_LEVEL_HIGH>,
					     <GIC_SPI IRQ_GLB_QM_CPU2 IRQ_TYPE_LEVEL_HIGH>,
					     <GIC_SPI IRQ_GLB_QM_CPU3 IRQ_TYPE_LEVEL_HIGH>;
	};
