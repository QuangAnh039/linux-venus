%YAML 1.2
---
$id: http://devicetree.org/schemas/gpio/cortina-access,gpio.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Cortina-Access GPIO controller

maintainers:
  - Lee Jenfeng (jenfeng.lee@coritna-access.com)

properties:
  compatible:
    items:
      - enum:
          - cortina-access,mercury-gpio
  reg:
    maxItems: 1

  interrupts:
    minItems: 1
    maxItems: 32

  interrupt-controller: true

  "#interrupt-cells":
    const: 2

  clocks:
    maxItems: 1

  "#gpio-cells":
    const: 2

  ngpios:
    description:
      The number of GPIOs available on the controller implementation.
      It is 16 for the SiFive SoCs and 32 for the Canaan K210.
    minimum: 1
    maximum: 32
    default: 16

  gpio-line-names:
    minItems: 1
    maxItems: 32

  gpio-controller: true

