%YAML 1.2
---
$id: "http://devicetree.org/schemas/phy/cortina-access,ca8289-u2phy.yaml#"
$schema: "http://devicetree.org/meta-schemas/core.yaml#"

title: Cortina-Access SoC USB2 PHY

maintainers:
  - Pengpeng Chen <pengpeng.chen@cortina-access.com>

properties:
  compatible:
     const: cortina-access,ca8289-u2phy

  reg:
    maxItems: 1

  reg-names:
    items:
      - const: u2host_reg

  resets:
    maxItems: 1

  reset-names:
    items:
      - const: usbcore_reset

  portnum:
    const: 3

  phy_data_size:
    const: 10

  phy_data_addr:
    const: 10

  phy_data_array:
    const: 10

  status:
    items:
      - const: disabled

required:
  - compatible
  - reg
  - reg-names
  - resets
  - reset-names
  - portnum
  - phy_data_size
  - phy_data_addr
  - phy_data_array
  - status

additionalProperties: false

examples:
  - |
    u2phy: usbphy@f432b028 {
        compatible = "cortina-access,ca8289-u2phy";
        reg = <0x0 0xf432b028 0x0 0x28>;
        reg-names = "u2host_reg";
        #address-cells = <2>;
        #size-cells = <2>;
        ranges;
        resets = <&block_rst USB_RESET>;
        reset-names = "usbcore_reset";

        /*
         * 0x0 -- NO usb2 ports enabled
         * 0x1 -- usb2 port0 only enabled
         * 0x2 -- usb2 port1 only enabled
         * 0x3 -- usb2 port1 and port0 enabled
         * 0x4 -- usb2 port2 only enabled
         * 0x5 -- usb2 port2 and port0 enabled
         * 0x6 -- usb2 port2 and port1 enabled
         * 0x7 -- all three usb2 ports enabled
         */
        u2portmask = <0x7>;

        phy_data_size = <10>;
        phy_data_addr = /bits/ 8
            <0xF4 0xE0 0xE0 0xF4 0xE0 0xE4 0xF5 0xF7 0xF4 0xE3>;
        phy_data_array = /bits/ 8
            <0xBB 0x21 0x25 0x9B 0x18 0x8B 0x01 0x32 0xBB 0x44>;
            /* 0x21->0x25 start calibration */
            /* Address 0xF4(bit#5) specify page number */
        status = "disabled";
    };