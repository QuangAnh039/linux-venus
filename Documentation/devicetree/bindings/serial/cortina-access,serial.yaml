%YAML 1.2
---
$id: http://devicetree.org/schemas/serial/serial.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Cortina-Access Serial Interferace

maintainers:
  - Lee Jenfeng <jenfeng.lee@cortina-access.com>

properties:
  compatible:
    const: ortina-access,serial

  reg:
    maxItems: 1

  clocks:
    maxItems: 1

  interrupts:
    maxItems: 1

examples:
  - |
    uart0: uart@f43291cc {
        device_type = "serial";
        compatible = "cortina-access,serial";
        reg = <0x00000000 0xf43291cc 0x0 0x30>;
        clocks = <&apb_pclk>;
        interrupt-parent = <&gic>;
        interrupts = <GIC_SPI 4 IRQ_TYPE_LEVEL_HIGH>;
    };
