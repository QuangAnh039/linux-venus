%YAML 1.2
---
$id: http://devicetree.org/schemas/watchdog/cortina-access,wdt.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Watchdog driver for Cortina-Access platform, Inc.

maintainers:
  - Jason Li <jason.li@cortina-access.com>

description:
  This hardware watchdog is present on Cortina-Access platform.

properties:
  compatible:
    enum:
      - cortina-access,wdt

  reg:
    maxItems: 2
    description:
      Hareware address of WDT controller

  clocks:
    maxItems: 1

  interrupts:
    maxItems: 1

  reset-on-timeout:
    Enable HW reset in when WDT timeout.

required:
  - compatible
  - reg
  - clocks
  - interrupts

additionalProperties: false

examples:
  - |

/ {
	wdt: wdt@f432901c {
        compatible = "cortina-access,wdt";
        reg = <0x0 0xf432901c 0x0 0x30>,
              <0x0 0xf4320020 0x0 0x04>;
        interrupt-parent = <&per_ictl>;
        interrupts = <IRQ_PER_WDT>;
        clocks = <&apb_pclk>;
        reset-on-timeout;
        delay-reset = <134>; /* Millisecond, maximum is 134ms */
    };
};


...
