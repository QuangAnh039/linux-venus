		serdes-cfg-dataA = /*S8, GEN1*/
								<0x20 0x3599>,
								<0x2c 0xbf0d>,
								<0x34 0xe726>,
								<0x38 0x5000>,
								<0x80 0x44c8>,
							/*GEN2*/
								<0x220 0x3599>,
								<0x22c 0xbf0d>,
								<0x234 0xe726>,
								<0x238 0x5000>,
