%YAML 1.2
---
$id: http://devicetree.org/schemas/i2c/cortina-access,i2c.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: I2C driver for Cortina-Access platform, Inc.

maintainers:
  - Ting Wu <ting.wu@cortina-access.com>

description:
  This hardware i2c is present on Cortina-Access platform.

properties:
  compatible:
    enum:
      - cortina-access,venus-i2c
      - cortina-access,mercury-i2c

  reg:
    maxItems: 2
    description:
      Hareware address of I2C controller

  clocks:
    maxItems: 1

  interrupts:
    maxItems: 1


required:
  - compatible
  - reg
  - clocks
  - interrupts

additionalProperties: false

examples:
  - |

/ {
	i2c0: i2c@f432917c {
		#address-cells = <1>;
		#size-cells = <0>;
		compatible = "cortina,mercury-i2c";
		reg = <0x00000000 0xf432917c 0x0 0x28>;
		reg-names = "i2c_ctrl";
		interrupt-parent = <&per_ictl>;
		interrupts = <IRQ_PER_BIW0>;
		device_type = "i2c";
		clocks = <&apb_pclk>;
		clock-frequency = <100000>;
		timeout = <1000>;
		retries = <3>;
	};
};


...
