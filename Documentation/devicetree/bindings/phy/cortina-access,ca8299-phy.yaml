%YAML 1.2
---
$id: "http://devicetree.org/schemas/phy/cortina-access,ca8299-phy.yaml#"
$schema: "http://devicetree.org/meta-schemas/core.yaml#"

title: Cortina-Access CA8299 SoC Global PHY

maintainers:
  - Pengpeng Chen <pengpeng.chen@cortina-access.com>

properties:
  compatible:
     const: cortina-access,ca8299-phy

  reg:
    maxItems: 1

  reg-names:
    items:
      - const: glb_phy_reg

required:
  - compatible
  - reg
  - reg-names

additionalProperties: false

examples:
  - |
    glb: phy@f43200b8 {
		    #address-cells = <1>;
		    #size-cells = <0>;
		    compatible = "cortina-access,ca8299-phy";
		    reg = <0x0 0xf43200b8 0x0 0x98>;
		    reg-names = "glb_phy_ctrl";

		    s0_pcie_phy: phy@PHY_S0_PCIE {
			    reg = <PHY_S0_PCIE>;
			    #phy-cells = <0>;
		    };

		    s1_pcie_phy: phy@PHY_S1_PCIE {
			    reg = <PHY_S1_PCIE>;
			    #phy-cells = <0>;
		    };

		    s2_pcie_phy: phy@PHY_S2_PCIE {
			    reg = <PHY_S2_PCIE>;
			    #phy-cells = <0>;
		    };

		    s7_pcie_phy: phy@PHY_S7_PCIE {
			    reg = <PHY_S7_PCIE>;
			    #phy-cells = <0>;
		    };

		    s8_pcie_phy: phy@PHY_S8_PCIE {
			    reg = <PHY_S8_PCIE>;
			    #phy-cells = <0>;
		    };
	  };
