%YAML 1.2
---
$id: http://devicetree.org/schemas/iommu/cortina-access,venus.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Cortina Access SoC Device Tree Bindings

properties:
  compatible:
    enum:
      - cortina-access,g3
      - cortina-access,g3hgu
      - cortina-access,saturn-sfu
      - cortina-access,venus
      - cortina-access,mercury

  reg:
    minItems: 2
    maxItems: 2

  reg-names:
    const: JTAG_ID

  clocks:
    minItems: 1
    items:
      - const: pll_cpll_clk
      - const: pll_epll_clk
      - const: pll_fpll_clk
      - const: cpu_daemon_clk
      - const: div_cci_clk
      - const: div_lsaxi_clk
      - const: div_core_clk
      - const: div_crypto_clk
      - const: mux_pe_clk
      - const: mux_peaxi_clk
      - const: factor_peripheral_clk

  clock-names:
    minItems: 1
    items:
      - const: cpll
      - const: epll
      - const: fpll
      - const: cpu_clk
      - const: cci_clk
      - const: lsaxi_clk
      - const: core_clk
      - const: crypto_clk
      - const: pe_clk
      - const: peaxi_clk
      - const: per_clk

  nvmem-cells:
    const: uuid

  nvmem-cell-names:
    const: uuid

required:
  - compatible
  - reg
  - reg-names
  - clock
  - clock-names
  - nvmem-cells
  - nvmem-cell-names

additionalProperties: false

examples:
  - |
    soc {
        compatible = "cortina-access,venus";
        reg = <0x00000000 0xf4320000 0x0 0x4>;
        reg-names = "JTAG_ID";

        clocks = <&pll_cpll_clk>, <&pll_epll_clk>, <&pll_fpll_clk>,
                 <&cpu_daemon_clk>, <&div_cci_clk>, <&div_lsaxi_clk>,
                 <&div_core_clk>, <&div_crypto_clk>, <&mux_pe_clk>,
                 <&mux_peaxi_clk>, <&factor_peripheral_clk>;
        clock-names = "cpll", "epll", "fpll",
                      "cpu_clk", "cci_clk", "lsaxi_clk",
                      "core_clk", "crypto_clk", "pe_clk",
                      "peaxi_clk", "per_clk";

        nvmem-cells = <&uuid>;
        nvmem-cell-names = "uuid";
    };
